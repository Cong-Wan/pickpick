<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Group Card Stack Effect v3</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; line-height: 1.5; }
  :root {
    --bg-primary: #f5f5f7; --bg-secondary: #ffffff; --bg-tertiary: #e5e5e7;
    --border: #d1d1d6; --text-primary: #1d1d1f; --text-secondary: #86868b;
    --accent: #0071e3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1d1d1f; --bg-secondary: #2d2d2f; --bg-tertiary: #3d3d3f;
      --border: #424245; --text-primary: #f5f5f7; --text-secondary: #86868b;
      --accent: #0a84ff;
    }
  }
  body { background: var(--bg-primary); color: var(--text-primary); display: flex; flex-direction: column; }
  .header { background: var(--bg-secondary); padding: 0.5rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0; font-size: 0.85rem; color: var(--text-secondary); display: flex; justify-content: space-between; }
  .main { flex: 1; overflow-y: auto; padding: 2rem; }
  .indicator-bar { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 0.5rem 1.5rem; flex-shrink: 0; text-align: center; font-size: 0.75rem; color: var(--text-secondary); }
  h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; }
  .section { margin-bottom: 2.5rem; }

  .app-window {
    border: 2px solid var(--border); border-radius: 12px; overflow: hidden;
    background: var(--bg-secondary); margin-top: 12px;
    aspect-ratio: 1.45; max-width: 500px;
  }
  .win-toolbar {
    background: var(--bg-tertiary); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border); font-size: 12px;
  }

  .groups-body {
    height: calc(100% - 29px); padding: 16px; display: grid;
    grid-template-columns: 1fr 1fr; gap: 12px; overflow-y: auto;
  }

  /* Card: no outer border, images on top, text below */
  .group-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
  }

  .stack-container {
    height: 100px;
    position: relative;
  }
  .stack-img {
    position: absolute; width: 60%; height: 78%; border-radius: 4px;
    background: #d0d0d4; border: 1px solid rgba(0,0,0,0.06);
    display: flex; align-items: center; justify-content: center;
    color: #666; font-size: 10px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  @media (prefers-color-scheme: dark) {
    .stack-img { background: #3d3d3f; color: #888; border-color: rgba(255,255,255,0.06); }
  }
  .stack-img:nth-child(1) { top: 6px; left: 10%; transform: rotate(-4deg); z-index: 3; }
  .stack-img:nth-child(2) { top: 12px; left: 22%; transform: rotate(3deg); z-index: 2; }
  .stack-img:nth-child(3) { top: 18px; left: 32%; transform: rotate(-1deg); z-index: 1; }

  .card-text { padding: 0 2px; display: flex; justify-content: space-between; align-items: baseline; }
  .card-text .name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
  .card-text .count { font-size: 11px; color: var(--text-secondary); }
</style>
</head>
<body>
<div class="header"><span>Group Card Stack Design v3</span><span style="color:#34c759">● Live</span></div>
<div class="main">

<div class="section">
<h2>分组卡片 — 图片在上、文字在下</h2>
<p class="subtitle">去掉外层灰色矩形框和黑色遮罩，叠放图片区域独立，文字显示在图片下方</p>
<div class="app-window">
  <div class="win-toolbar"><span>rawViewer</span><span></span></div>
  <div class="groups-body">
    <div class="group-card">
      <div class="stack-container">
        <div class="stack-img">[图1]</div>
        <div class="stack-img">[图2]</div>
        <div class="stack-img">[图3]</div>
      </div>
      <div class="card-text">
        <div class="name">Overexposed</div>
        <div class="count">12</div>
      </div>
    </div>
    <div class="group-card">
      <div class="stack-container">
        <div class="stack-img">[图1]</div>
        <div class="stack-img">[图2]</div>
      </div>
      <div class="card-text">
        <div class="name">Underexposed</div>
        <div class="count">8</div>
      </div>
    </div>
    <div class="group-card">
      <div class="stack-container">
        <div class="stack-img">[图1]</div>
        <div class="stack-img">[图2]</div>
        <div class="stack-img">[图3]</div>
      </div>
      <div class="card-text">
        <div class="name">Blurry</div>
        <div class="count">5</div>
      </div>
    </div>
    <div class="group-card">
      <div class="stack-container">
        <div class="stack-img">[图1]</div>
        <div class="stack-img">[图2]</div>
        <div class="stack-img">[图3]</div>
      </div>
      <div class="card-text">
        <div class="name">Normal</div>
        <div class="count">95</div>
      </div>
    </div>
    <div class="group-card">
      <div class="stack-container">
        <div class="stack-img">[图1]</div>
        <div class="stack-img">[图2]</div>
      </div>
      <div class="card-text">
        <div class="name">Duplicate G1</div>
        <div class="count">3</div>
      </div>
    </div>
  </div>
</div>
</div>

<p class="subtitle" style="margin-top:24px;font-size:0.9rem">
现在：叠放图片区域有浅色背景（不是全黑），文字（分组名+数量）在图片下方独立显示，不覆盖图片。<br>
请确认效果后在终端回复。
</p>

</div>
<div class="indicator-bar">确认后在终端回复</div>
</body>
</html>
