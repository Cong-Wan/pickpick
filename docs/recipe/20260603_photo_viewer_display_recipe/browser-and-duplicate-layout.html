<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>rawViewer Layout Final</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; line-height: 1.5; }
  :root {
    --bg-primary: #f5f5f7; --bg-secondary: #ffffff; --bg-tertiary: #e5e5e7;
    --border: #d1d1d6; --text-primary: #1d1d1f; --text-secondary: #86868b;
    --accent: #0071e3; --selected-bg: #e8f4fd; --selected-border: #0071e3;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1d1d1f; --bg-secondary: #2d2d2f; --bg-tertiary: #3d3d3f;
      --border: #424245; --text-primary: #f5f5f7; --text-secondary: #86868b;
      --accent: #0a84ff; --selected-bg: rgba(10,132,255,0.15); --selected-border: #0a84ff;
    }
  }
  body { background: var(--bg-primary); color: var(--text-primary); display: flex; flex-direction: column; }
  .header { background: var(--bg-secondary); padding: 0.5rem 1.5rem; border-bottom: 1px solid var(--border); flex-shrink: 0; font-size: 0.85rem; color: var(--text-secondary); display: flex; justify-content: space-between; }
  .main { flex: 1; overflow-y: auto; padding: 2rem; }
  .indicator-bar { background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 0.5rem 1.5rem; flex-shrink: 0; text-align: center; font-size: 0.75rem; color: var(--text-secondary); }
  h2 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
  .subtitle { color: var(--text-secondary); margin-bottom: 1.5rem; }
  .section { margin-bottom: 2.5rem; }

  .app-window {
    border: 2px solid var(--border); border-radius: 12px; overflow: hidden;
    background: var(--bg-secondary); margin-top: 12px;
    aspect-ratio: 1.45; max-width: 700px;
  }
  .win-toolbar {
    background: var(--bg-tertiary); padding: 6px 12px; display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .win-toolbar .seg { background: var(--bg-secondary); border-radius: 4px; padding: 2px 8px; font-size: 11px; }
  .win-body { display: flex; height: calc(100% - 29px); }

  .win-sidebar {
    width: 150px; background: var(--bg-primary); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto;
  }
  .win-sidebar-header {
    padding: 6px 8px; border-bottom: 1px solid var(--border); font-size: 11px;
    display: flex; align-items: center; gap: 4px; color: var(--text-secondary);
  }
  .cb { width: 12px; height: 12px; border: 1.5px solid var(--border); border-radius: 2px; display: inline-block; }
  .cb.checked { background: var(--accent); border-color: var(--accent); }
  .cb.checked::after { content: '✓'; color: #fff; font-size: 9px; display: block; text-align: center; line-height: 9px; }

  .win-thumb {
    height: 56px; background: #2a2a2a; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    color: #888; font-size: 10px; border: 2px solid transparent;
    position: relative; margin: 4px 6px;
  }
  .win-thumb.active { border-color: var(--accent); }
  .win-thumb .cb { position: absolute; top: 3px; left: 3px; background: rgba(0,0,0,0.5); }

  .win-main {
    flex: 1; background: #1a1a1a; display: flex; align-items: center; justify-content: center; color: #888; font-size: 13px;
  }
  .win-half {
    flex: 1; background: #1a1a1a; display: flex; align-items: center; justify-content: center; color: #888; font-size: 13px;
    border-right: 1px solid var(--border);
  }
  .win-half:last-child { border-right: none; }
</style>
</head>
<body>
<div class="header"><span>rawViewer Layout Design</span><span style="color:#34c759">● Live</span></div>
<div class="main">

<div class="section">
<h2>普通分组浏览页</h2>
<p class="subtitle">左侧缩略图列表（顶部全选 + 每张图左上角 checkbox）+ 右侧 MTKView 主图</p>
<div class="app-window">
  <div class="win-toolbar">
    <span>Overexposed · 12</span>
    <span><span class="seg">JPG</span> <span class="seg" style="opacity:0.5">RAW</span> 🗑</span>
  </div>
  <div class="win-body">
    <div class="win-sidebar">
      <div class="win-sidebar-header">
        <span class="cb checked"></span> 全选
      </div>
      <div class="win-thumb active">
        <span class="cb checked"></span> [图1]
      </div>
      <div class="win-thumb">
        <span class="cb"></span> [图2]
      </div>
      <div class="win-thumb">
        <span class="cb"></span> [图3]
      </div>
      <div class="win-thumb">
        <span class="cb"></span> [图4]
      </div>
      <div class="win-thumb">
        <span class="cb"></span> [...]
      </div>
    </div>
    <div class="win-main">[ MTKView 主图 ]</div>
  </div>
</div>
</div>

<div class="section">
<h2>重复组对比页</h2>
<p class="subtitle">左右等宽双图对比</p>
<div class="app-window">
  <div class="win-toolbar">
    <span>Duplicate G7 · 5</span>
    <span><span class="seg" style="background:var(--accent);color:#fff">Keep both</span> <span class="seg">JPG</span> <span class="seg" style="opacity:0.5">RAW</span></span>
  </div>
  <div class="win-body">
    <div class="win-half">[ 主图 ]</div>
    <div class="win-half">[ 候选图 ]</div>
  </div>
</div>
</div>

<p class="subtitle" style="margin-top:24px;font-size:0.9rem">
请确认布局后回复。
</p>

</div>
<div class="indicator-bar">确认后在终端回复</div>
</body>
</html>
